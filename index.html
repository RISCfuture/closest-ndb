<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="geolocation=(self), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=()"
    />

    <!-- Primary Meta Tags -->
    <title>Closest NDB</title>
    <meta name="title" content="Closest NDB" />
    <meta name="description" content="Where is the closest NDB to me right now?" />
    <meta name="author" content="Tim Morgan" />
    <meta name="theme-color" content="#7d5732" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tim.codes/closest-ndb/" />
    <meta property="og:title" content="Closest NDB" />
    <meta property="og:description" content="Where is the closest NDB to me right now?" />
    <meta property="og:image" content="/icon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://tim.codes/closest-ndb/" />
    <meta property="twitter:title" content="Closest NDB" />
    <meta property="twitter:description" content="Where is the closest NDB to me right now?" />
    <meta property="twitter:image" content="/icon.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Closest NDB" />

    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="mask-icon" href="pinned-tab.svg" color="#7d5732" />
    <link
      rel="preload"
      as="font"
      href="./fonts/morse.ttf"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      as="font"
      href="./fonts/mulish.ttf"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      as="font"
      href="./fonts/mulish-italic.ttf"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- JSON-LD: WebApplication schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Closest NDB",
        "description": "A web tool that locates the closest aviation Non-Directional Beacon (NDB) to your current geographic position, displaying its bearing, distance, identifier, frequency, and Morse code identifier.",
        "url": "https://tim.codes/closest-ndb/",
        "applicationCategory": "UtilitiesApplication",
        "applicationSubCategory": "Aviation",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript and a browser with Geolocation support.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "Tim Morgan",
          "url": "https://tim.codes"
        },
        "inLanguage": "en",
        "isAccessibleForFree": true
      }
    </script>
  </head>

  <body>
    <noscript>
      <strong>Please enable JavaScript to know where your closest NDB is.</strong>
    </noscript>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
